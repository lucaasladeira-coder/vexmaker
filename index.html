<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VexMaker — Gestão de Impressões 3D</title>
  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,300;1,400;1,500&display=swap" rel="stylesheet">
  
  <!-- Modern Vite Script Loading -->
  <script type="module" src="/src/main.js"></script>
</head>
<body>

  <div class="container">
    
    <!-- HEADER -->
    <header>
      <div class="brand-section">
        <!-- Styled Geometric Badge logo -->
        <div class="vm-logo">VM</div>
        <div class="brand-text">
          <h1>VEXMAKER</h1>
          <span>Imprimir . Criar . Testar . Realizar</span>
        </div>
      </div>
      
      <!-- Counter pills -->
      <div class="header-counters">
        <div class="counter-pill pill-red">
          <span class="number" id="hdr-nao-iniciado">0</span>
          <span>Não Iniciados</span>
        </div>
        <div class="counter-pill pill-yellow">
          <span class="number" id="hdr-em-producao">0</span>
          <span>Em Produção</span>
        </div>
        <div class="counter-pill pill-green">
          <span class="number" id="hdr-concluido">0</span>
          <span>Concluídos</span>
        </div>
      </div>
    </header>

    <!-- NEW ORDER FORM -->
    <section class="form-section">
      <h2 class="form-title">➕ Novo Pedido</h2>
      <form id="order-form" novalidate>
        <div class="form-grid">
          
          <!-- Cliente Name -->
          <div class="form-group span-2">
            <label for="client-name">Nome do cliente</label>
            <input type="text" id="client-name" class="form-control" placeholder="Ex: João Silva" required>
            <div class="error-message">Campo obrigatório</div>
          </div>

          <!-- Deadline -->
          <div class="form-group">
            <label for="delivery-deadline">Prazo de entrega</label>
            <input type="date" id="delivery-deadline" class="form-control" required>
            <div class="error-message">Campo obrigatório</div>
          </div>

          <!-- What to print -->
          <div class="form-group span-2">
            <label for="print-description">O que imprimir</label>
            <textarea id="print-description" class="form-control" rows="3" placeholder="Ex: Suporte para celular, miniatura..." required></textarea>
            <div class="error-message">Campo obrigatório</div>
          </div>

          <!-- Observations -->
          <div class="form-group">
            <label for="general-obs">Observações gerais</label>
            <textarea id="general-obs" class="form-control" rows="2" placeholder="Ex: Imprimir em PLA vermelho, escala 1:2..."></textarea>
          </div>

          <!-- Submit Button -->
          <div class="form-group span-3">
            <button type="submit" class="btn-submit">
              <span>CRIAR PEDIDO</span>
            </button>
          </div>

        </div>
      </form>
    </section>

    <!-- ORDERS DASHBOARD -->
    <main class="dashboard-grid">
      
      <!-- COLUMN 1: NÃO INICIADO -->
      <section class="dashboard-col col-nao-iniciado">
        <div class="col-header">
          <h3 class="col-title">🔴 NÃO INICIADO</h3>
          <span class="col-count" id="count-nao-iniciado">0</span>
        </div>
        <div class="card-list" id="list-nao-iniciado">
          <!-- Dynamically inserted cards -->
        </div>
      </section>

      <!-- COLUMN 2: EM PRODUÇÃO -->
      <section class="dashboard-col col-em-producao">
        <div class="col-header">
          <h3 class="col-title">🟡 EM PRODUÇÃO</h3>
          <span class="col-count" id="count-em-producao">0</span>
        </div>
        <div class="card-list" id="list-em-producao">
          <!-- Dynamically inserted cards -->
        </div>
      </section>

      <!-- COLUMN 3: CONCLUÍDO -->
      <section class="dashboard-col col-concluido">
        <div class="col-header">
          <h3 class="col-title">🟢 CONCLUÍDO</h3>
          <span class="col-count" id="count-concluido">0</span>
        </div>
        <div class="card-list" id="list-concluido">
          <!-- Dynamically inserted cards -->
        </div>
      </section>

    </main>

  </div>

  <!-- TOAST NOTIFICATIONS POPUP CONTAINER -->
  <div id="toast-container"></div>

  <!-- CONFIRM DELETE MODAL -->
  <div class="modal-backdrop" id="delete-modal">
    <div class="modal-container">
      <div class="modal-icon">
        <!-- SVG Warning -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12S6.48 22 12 22 22 17.52 22 12 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" />
        </svg>
      </div>
      <h4 class="modal-title">Confirmar Exclusão</h4>
      <p class="modal-desc" id="delete-modal-text">Tem certeza que deseja excluir este pedido?</p>
      <div class="modal-buttons">
        <button class="btn-modal btn-modal-cancel" id="btn-cancel-delete">Cancelar</button>
        <button class="btn-modal btn-modal-confirm" id="btn-confirm-delete">Excluir</button>
      </div>
    </div>
  </div>

</body>
</html>
